name = "dimitri-site-analytics"
main = "src/index.js"
compatibility_date = "2026-03-17"

[vars]
ALLOWED_ORIGINS = "https://dimitrichrysafis.github.io,http://localhost:8000"
RATE_LIMIT_PER_MINUTE = "60"
DISCORD_WEBHOOK_USERNAME = "Site Analytics"
DISCORD_WEBHOOK_AVATAR_URL = ""

[[d1_databases]]
binding = "DB"
database_name = "site_analytics"
database_id = "REPLACE_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "ANALYTICS_KV"
id = "REPLACE_KV_NAMESPACE_ID"
preview_id = "REPLACE_KV_PREVIEW_ID"
